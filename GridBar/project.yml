name: GridBar
options:
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.gridbar.app
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  GridBar:
    type: application
    platform: macOS
    sources:
      - path: Sources/GridBar
        excludes:
          - "Info.plist"
    settings:
      base:
        INFOPLIST_FILE: Sources/GridBar/Info.plist
        INFOPLIST_PREPROCESS: NO
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: Sources/GridBar/GridBar.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.screen-recording: true
